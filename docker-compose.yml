services:
  quicknote:
    build: .
    ports:
      - "5551:3000"
    env_file:
      - .env
    environment:
      NUXT_HOST: "0.0.0.0"
      NUXT_PORT: "3000"
      NOTES_DIR: "/data/notes"
    user: "1000:1000"
    volumes:
      # Notes and canvas state are persisted here.
      # Change the left side to any host path you like, e.g. ~/my-notes:/data/notes
      - $HOME/.quickNote:/data/notes
    restart: unless-stopped
