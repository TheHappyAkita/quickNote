services:
  quicknote:
    build: .
    ports:
      - "3000:3000"
    environment:
      NUXT_HOST: "0.0.0.0"
      NUXT_PORT: "3000"
      NUXT_SESSION_PASSWORD: "${NUXT_SESSION_PASSWORD}"
      AUTH_USERS: "${AUTH_USERS}"
      NOTES_DIR: "/data/notes"
    volumes:
      # Notes and canvas state are persisted here.
      # Change the left side to any host path you like, e.g. ~/my-notes:/data/notes
      - ./notes:/data/notes
    restart: unless-stopped
